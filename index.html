<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="L'Oréal Smart Routine and Product Advisor — personalized beauty guidance."
    />
    <title>L'Oréal Beauty Advisor</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <header class="site-header">
        <div class="brand-row">
          <div class="brand-logo" aria-label="L'Oréal">L'OREAL</div>
          <div class="brand-text">
            <h1 class="site-title">Smart Routine &amp; Product Advisor</h1>
            <p class="site-tagline">
              Discover routines and recommendations across makeup, skincare,
              haircare, and fragrance.
            </p>
          </div>
        </div>
      </header>

      <main>
        <section class="chatbox" aria-label="Chat conversation">
          <div id="chatWindow" class="chat-window">
            <div id="messagesContainer" class="messages" role="log" aria-live="polite"></div>
          </div>

          <div
            id="errorBanner"
            class="error-banner"
            role="alert"
            hidden
          ></div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Your message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask about L'Oréal products, routines, or beauty tips…"
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn" aria-label="Send message">
              <span class="material-icons" aria-hidden="true">send</span>
            </button>
          </form>
        </section>
      </main>

      <footer class="site-footer">
        <p>&copy; <span id="year"></span> L'Oréal. Educational project.</p>
        <nav aria-label="Footer links">
          <a
            href="https://www.loreal.com/privacy-policy"
            target="_blank"
            rel="noopener noreferrer"
            >Privacy Policy</a
          >
          <a
            href="https://www.loreal.com/group"
            target="_blank"
            rel="noopener noreferrer"
            >L'Oréal Group</a
          >
          <a
            href="https://www.loreal.com/contact"
            target="_blank"
            rel="noopener noreferrer"
            >Contact</a
          >
        </nav>
      </footer>
    </div>

    <!-- Local dev: copy secrets.example.js to secrets.js, set OPENAI_API_KEY, set API_MODE to "local" in script.js, then change src to secrets.js. -->
    <script src="secrets.example.js"></script>
    <script src="script.js" defer></script>
  </body>
</html>
